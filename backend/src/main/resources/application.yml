server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/portfolio?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: personal-ai-portfolio-jwt-secret-change-in-production
  expiration: 604800000

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
